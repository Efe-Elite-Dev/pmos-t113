name: Build postmarketOS for goyavewifi (Force Config)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pmbootstrap from Source
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          cd pmbootstrap
          pip install .
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure and Init pmbootstrap
        run: |
          # 1. Çalışma dizinlerini oluştur
          mkdir -p /home/runner/work/pmbootstrap_work
          
          # 2. Ayarları manuel olarak setle (Soru sormasını engeller)
          pmbootstrap config work /home/runner/work/pmbootstrap_work
          pmbootstrap config jobs 4
          pmbootstrap config channel edge
          pmbootstrap config device samsung-goyavewifi
          pmbootstrap config extra_packages postmarketos-base-downstream,soc-sprd-audio-sc8830,alsa-utils,nano
          
          # 3. UI olarak XFCE4 seç (Logda console/systemd hatasını önlemek için)
          pmbootstrap config ui xfce4
          
          # 4. Init işlemini interaktif olmayan modda çalıştır
          pmbootstrap -y init

      - name: Inject Device Customizations
        run: |
          # X11 Rotasyon ayarı
          pmbootstrap chroot -r -- ash -c "mkdir -p /etc/X11/xorg.conf.d/ && printf 'Section \"Device\"\n    Identifier \"LCD\"\n    Driver \"fbdev\"\n    Option \"Rotate\" \"CCW\"\nEndSection' > /etc/X11/xorg.conf.d/00-fbdev-rotate-CCW.conf"

          # PulseAudio tsched fix
          pmbootstrap chroot -r -- sed -i 's/load-module module-udev-detect/load-module module-udev-detect tsched=0/g' /etc/pulse/default.pa

          # Udev Dokunmatik Fix
          pmbootstrap chroot -r -- ash -c "printf 'SUBSYSTEM==\"input\", ATTRS{phys}==\"1-0048/input0\", ENV{LIBINPUT_CALIBRATION_MATRIX}=\"0 1 0 -1 0 1\"' > /etc/udev/rules.d/00-touchscreen-dev.rules"

          # Swap Fstab
          pmbootstrap chroot -r -- ash -c "echo '/system/swapfile swap swap sw,nofail 0 0' >> /etc/fstab"

      - name: Build and Export Image
        run: |
          # Şifre belirleyerek kurulumu başlat
          pmbootstrap install --no-fsprogs --password=1234
          pmbootstrap export

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-goyavewifi-v3
          path: /tmp/postmarketOS-export/
