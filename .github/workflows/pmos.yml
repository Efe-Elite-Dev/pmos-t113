name: Build postmarketOS for goyavewifi (Fixed GitLab Source)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pmbootstrap from NEW Source
        run: |
          # Yeni GitLab adresinden çekiyoruz
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          cd pmbootstrap
          pip install .
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize pmbootstrap
        run: |
          # pmbootstrap init artık çalışma dizinini ilk başta soruyor
          pmbootstrap init <<EOF
          /home/runner/work/pmbootstrap_work
          edge
          samsung
          goyavewifi
          xfce4
          EOF

      - name: Inject Custom Configurations
        run: |
          pmbootstrap config extra_packages postmarketos-base-downstream,soc-sprd-audio-sc8830,alsa-utils,nano

          # 1. X11 Rotasyon ayarı
          pmbootstrap chroot -r -- ash -c "mkdir -p /etc/X11/xorg.conf.d/ && printf 'Section \"Device\"\n    Identifier \"LCD\"\n    Driver \"fbdev\"\n    Option \"Rotate\" \"CCW\"\nEndSection' > /etc/X11/xorg.conf.d/00-fbdev-rotate-CCW.conf"

          # 2. PulseAudio tsched fix
          pmbootstrap chroot -r -- sed -i 's/load-module module-udev-detect/load-module module-udev-detect tsched=0/g' /etc/pulse/default.pa

          # 3. Udev Dokunmatik Fix
          pmbootstrap chroot -r -- ash -c "printf 'SUBSYSTEM==\"input\", ATTRS{phys}==\"1-0048/input0\", ENV{LIBINPUT_CALIBRATION_MATRIX}=\"0 1 0 -1 0 1\"' > /etc/udev/rules.d/00-touchscreen-dev.rules"

          # 4. Swap Fstab Kaydı
          pmbootstrap chroot -r -- ash -c "echo '/system/swapfile swap swap sw,nofail 0 0' >> /etc/fstab"

      - name: Build and Export Image
        run: |
          # EMMC 8GB olduğu için export şart demiştin
          pmbootstrap install --no-fsprogs
          pmbootstrap export

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-goyavewifi-fixed
          path: /tmp/postmarketOS-export/
