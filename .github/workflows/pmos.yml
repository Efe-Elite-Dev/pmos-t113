name: Build postmarketOS for goyavewifi

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pmbootstrap
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          cd pmbootstrap
          pip install .
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize pmbootstrap (Interactive Flow Fix)
        run: |
          # Görsellerindeki sıraya göre cevapları dizdik:
          # 1. Work Path, 2. Pmaports (Boş), 3. Channel (edge), 4. Vendor (samsung), 5. Device (goyavewifi)
          pmbootstrap init <<EOF
          /home/runner/work/pmbootstrap_work
          
          edge
          samsung
          goyavewifi
          xfce4
          EOF

      - name: Inject Device Fixes
        run: |
          # X11, PulseAudio ve Dokunmatik ayarlarını build öncesi içeri basıyoruz
          pmbootstrap config extra_packages postmarketos-base-downstream,soc-sprd-audio-sc8830,alsa-utils,nano
          
          pmbootstrap chroot -r -- ash -c "mkdir -p /etc/X11/xorg.conf.d/ && printf 'Section \"Device\"\n    Identifier \"LCD\"\n    Driver \"fbdev\"\n    Option \"Rotate\" \"CCW\"\nEndSection' > /etc/X11/xorg.conf.d/00-fbdev-rotate-CCW.conf"
          pmbootstrap chroot -r -- sed -i 's/load-module module-udev-detect/load-module module-udev-detect tsched=0/g' /etc/pulse/default.pa
          pmbootstrap chroot -r -- ash -c "printf 'SUBSYSTEM==\"input\", ATTRS{phys}==\"1-0048/input0\", ENV{LIBINPUT_CALIBRATION_MATRIX}=\"0 1 0 -1 0 1\"' > /etc/udev/rules.d/00-touchscreen-dev.rules"

      - name: Setup Tmate Session (Canlı Bağlantı)
        # Build devam ederken içeri girip "neler oluyor" bakman için link verecek
        uses: mxschmitt/action-tmate@v3
        if: always()

      - name: Build and Export
        run: |
          # Tmate terminalini kapattığında burası çalışmaya başlar
          pmbootstrap install --no-fsprogs --password=1234
          pmbootstrap export

      - name: Upload Flashable Image
        uses: actions/upload-artifact@v4
        with:
          name: pmos-goyavewifi-image
          path: /tmp/postmarketOS-export/
