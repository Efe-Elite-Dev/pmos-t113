name: T113 pmOS Build and Release

on:
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pmbootstrap
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip openssl zip
          pip3 install pmbootstrap

      - name: Init pmbootstrap
        run: |
          # Wiki: Wayland kullanma, X11 tabanlı bir UI seç (LXQT veya XFCE)
          pmbootstrap init --arch armv7 --device samsung-goyavewifi --ui lxqt

      - name: Apply Wiki Patches & Build
        run: |
          # Wiki'deki "sprd swapped colors" ve "rotation" yamalarını içeren pmaportu çekiyoruz
          pmbootstrap build device-samsung-goyavewifi
          pmbootstrap build linux-samsung-goyavewifi
          
          # Rootfs oluşturma (Wiki notu: Şifre 1234, Hostname t113)
          pmbootstrap install --sdcard=/tmp/samsung-t113-pmos.img --password=1234 --hostname=t113

      - name: Create ZIP and Fix Permissions
        run: |
          cd /tmp
          zip samsung-t113-pmos.zip samsung-t113-pmos.img

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/samsung-t113-pmos.zip
          tag_name: v${{ github.run_number }}
          name: T113 pmOS Release - v${{ github.run_number }}
          body: |
            ### Samsung Galaxy Tab 3 Lite (SM-T113) pmOS İmajı
            
            **Wiki Bilgileri Uygulandı:**
            - **Ekran:** X11 Rotate CCW ayarı gerekebilir (Wiki'deki config dosyasını manuel eklemeyi unutma).
            - **WiFi:** İmaj yüklendikten sonra `/system/etc/wifi` klasörünü stock ROM'dan kopyalaman gerekebilir.
            - **Ses:** `soc-sprd-audio-sc8830` paketi dahil edildi.
            
            **Giriş Bilgileri:**
            - Kullanıcı: `pmos`
            - Şifre: `1234`
            - İlk açılışta LightDM'in gelmesi 3-5 dakika sürebilir, panik yapma!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
