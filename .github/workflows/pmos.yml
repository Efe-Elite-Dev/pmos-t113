name: Build postmarketOS for goyavewifi (Auto-Config)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pmbootstrap
        run: |
          pip3 install --user pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize pmbootstrap
        run: |
          pmbootstrap init <<EOF
          /home/runner/work/pmbootstrap
          edge
          samsung
          goyavewifi
          xfce4
          EOF

      - name: Inject Custom Configurations (The "Efe" Special)
        run: |
          # 1. Paketleri ekle
          pmbootstrap config extra_packages postmarketos-base-downstream,soc-sprd-audio-sc8830,alsa-utils,nano,htop

          # 2. X11 Rotasyon ayarını ekle (Ekran yan bakmasın diye)
          pmbootstrap chroot -r -- ash -c "mkdir -p /etc/X11/xorg.conf.d/ && printf 'Section \"Device\"\n    Identifier \"LCD\"\n    Driver \"fbdev\"\n    Option \"Rotate\" \"CCW\"\nEndSection' > /etc/X11/xorg.conf.d/00-fbdev-rotate-CCW.conf"

          # 3. PulseAudio tsched fix (Ses cızırtısı için)
          pmbootstrap chroot -r -- sed -i 's/load-module module-udev-detect/load-module module-udev-detect tsched=0/g' /etc/pulse/default.pa

          # 4. Udev Dokunmatik Fix (Matrix ayarı)
          pmbootstrap chroot -r -- ash -c "printf 'SUBSYSTEM==\"input\", ATTRS{phys}==\"1-0048/input0\", ENV{LIBINPUT_CALIBRATION_MATRIX}=\"0 1 0 -1 0 1\"' > /etc/udev/rules.d/00-touchscreen-dev.rules"

          # 5. Swap Hazırlığı (Boot sırasında devreye girmesi için fstab'a ekle)
          pmbootstrap chroot -r -- ash -c "echo '/system/swapfile swap swap sw,nofail 0 0' >> /etc/fstab"

      - name: Build and Export
        run: |
          # SD karta kuracağın için export alıyoruz
          pmbootstrap install --no-fsprogs
          pmbootstrap export

      - name: Upload Flashable Image
        uses: actions/upload-artifact@v4
        with:
          name: pmos-goyavewifi-v1
          path: /tmp/postmarketOS-export/
